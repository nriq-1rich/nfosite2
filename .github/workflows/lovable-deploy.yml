name: "Build e Deploy para stable-website"

on:
  # Aciona o workflow em pushes para a branch 'main'
  push:
    branches:
      - main
  # Permite que você rode este workflow manualmente pela aba Actions
  workflow_dispatch:

# Define permissoes para o GITHUB_TOKEN
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do codigo do seu repositorio
      - name: "Checkout do Repositorio"
        uses: actions/checkout@v4

      # 2. Configura o ambiente Node.js (LTS mais recente)
      - name: "Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # 3. Instala as dependencias
      # (npm install funciona com ou sem package-lock.json)
      - name: "Instalar Dependencias"
        run: npm install

      # 4. Roda o script de build (gera a pasta 'dist')
      - name: "Rodar Build"
        run: npm run build

      # 5. Gera .htaccess para hospedagens Apache (SPA fallback para index.html)
      - name: "Gerar .htaccess para Apache"
        run: |
          cat > dist/.htaccess <<'HTACCESS'
          # Vite + React SPA hospedado em Apache
          DirectoryIndex index.html

          RewriteEngine On

          # SPA fallback: rotas inexistentes caem no index.html
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [L]

          <IfModule mod_headers.c>
            <FilesMatch "index\.html$">
              Header set Cache-Control "no-cache, no-store, must-revalidate"
            </FilesMatch>
            <FilesMatch "\.(?:js|css|woff2|woff|svg|png|jpg|jpeg|webp|gif|ico)$">
              Header set Cache-Control "public, max-age=31536000, immutable"
            </FilesMatch>
          </IfModule>

          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
          </IfModule>
          HTACCESS

      # 6. Faz o deploy da pasta 'dist' para a branch 'stable-website'
      - name: "Deploy para a Branch stable-website"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: stable-website
          folder: dist
          clean: true